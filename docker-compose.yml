services:
  argus:
    build:
      context: .
      dockerfile: Dockerfile
    image: argus-home-security:latest
    restart: unless-stopped
    ports:
      # Bind only on WireGuard IP — not exposed on LAN/public (see DEPLOY.md)
      - "${ARGUS_BIND_IP:-10.8.0.1}:${ARGUS_PORT:-9080}:8080"
    environment:
      TZ: ${TZ:-Europe/Bratislava}
      ARGUS_HA_UPSTREAM: ${ARGUS_HA_UPSTREAM:-}
    networks:
      - ha-argus
    extra_hosts:
      # Fallback if HA runs on host network instead of ha-argus network
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ha-argus:
    external: true
    name: ha-argus
