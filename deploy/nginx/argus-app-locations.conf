location / {
    try_files $uri $uri/ /index.html;
}

location /static/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

location = /static/manifest.json {
    root /usr/share/nginx/html;
    default_type application/manifest+json;
    try_files /static/manifest.json =404;
    access_log off;
    expires 1h;
}

location = /apple-touch-icon.png {
    alias /usr/share/nginx/html/static/favicon-180.png;
    default_type image/png;
    access_log off;
    expires 7d;
}

location = /apple-touch-icon-precomposed.png {
    alias /usr/share/nginx/html/static/favicon-180.png;
    default_type image/png;
    access_log off;
    expires 7d;
}

location = /favicon.ico {
    alias /usr/share/nginx/html/static/favicon.ico;
    default_type image/x-icon;
    access_log off;
    expires 7d;
}

location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
}

include /etc/nginx/argus/ha-proxy-locations.conf;
include /etc/nginx/argus/stt-proxy-locations.conf;
include /etc/nginx/argus/ollama-proxy-locations.conf;
