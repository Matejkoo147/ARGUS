location / {
    try_files $uri $uri/ /index.html;
}

# Never serve index.html for icon URLs — iOS rejects HTML and shows the "A" fallback.
location ~ ^/(favicon\.ico|favicon-\d+\.png|apple-touch-icon(?:-precomposed)?\.png|icon-\d+\.png|manifest\.webmanifest)$ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
}

include /etc/nginx/argus/ha-proxy-locations.conf;
include /etc/nginx/argus/stt-proxy-locations.conf;
include /etc/nginx/argus/ollama-proxy-locations.conf;
