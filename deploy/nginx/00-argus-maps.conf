# HA camera stream: <img src="...?token=..."> cannot send Authorization headers.
# Use client Bearer when present (fetch), else synthesize from ?token= / ?access_token=.
map $arg_token $argus_ha_auth_from_token {
    default "";
    "~.+" "Bearer $arg_token";
}

map $arg_access_token $argus_ha_auth_from_access_token {
    default "";
    "~.+" "Bearer $arg_access_token";
}

map "$argus_ha_auth_from_token:$argus_ha_auth_from_access_token" $argus_ha_auth_from_query {
    default $argus_ha_auth_from_token;
    "~^:" $argus_ha_auth_from_access_token;
}

map $http_authorization $argus_ha_camera_auth {
    default $http_authorization;
    ""      $argus_ha_auth_from_query;
}
