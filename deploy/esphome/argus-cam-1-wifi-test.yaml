# Minimal ESP32-CAM firmware — WiFi + HA only (no camera).
# Use when serial logs are empty or device won't join WiFi (less power draw on boot).
# Flash USB: .\recover-usb.ps1 -WifiOnly
# After online, OTA the full argus-cam-1.yaml from the dashboard.

esphome:
  name: argus-cam-1
  friendly_name: ARGUS Cam 1
  min_version: 2024.6.0

esp32:
  board: esp32cam
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "Argus-Cam-1 Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: UART0
