services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    # Host network: device discovery (Zigbee, ESP, mDNS). Listens on :8123 on the server.
    network_mode: host
    # Optional — only if you use Bluetooth/BLE devices (silences hci0 errors in logs):
    cap_add:
      - NET_ADMIN
      - NET_RAW
