services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    # Host network: best for device discovery (Zigbee, ESP, mDNS). Listens on :8123 on the server.
    network_mode: host
